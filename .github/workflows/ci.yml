name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────────

  test-rust:
    name: Rust tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: py_go_rs_services/rust
    steps:
      - uses: actions/checkout@v4

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-${{ hashFiles('rust/Cargo.lock') }}

      - name: Run tests
        run: cargo test

  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: py_go_rs_services/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Run tests
        run: go test ./... -v

  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: py_go_rs_services/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check . && ruff format --check .

      - name: Run tests
        run: pytest -v

  # ── Build & Push ─────────────────────────────────────────────────────────────

  build-rust:
    name: Build & push rust
    runs-on: ubuntu-latest
    needs: test-rust
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./py_go_rs_services/rust
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/rust-loyalty-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-go:
    name: Build & push go
    runs-on: ubuntu-latest
    needs: test-go
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./py_go_rs_services/go
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/go-order-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-python:
    name: Build & push python
    runs-on: ubuntu-latest
    needs: test-python
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ./py_go_rs_services/python
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/python-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max